<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나와의 행복</title>
<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff2" rel="preload" as="font" type="font/woff2" crossorigin>
<style>
@font-face {
  font-family: 'LeeSeoyun';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
</style>
<style>
  /* =============================================
     🎨 색상 & 폰트 수정 가능 영역
     ============================================= */
  :root {
    --color-primary: #7DB8FA;       /* 메인 파란색 */
    --color-primary-dark: #5B9BF8;  /* 진한 파란색 */
    --color-primary-light: #EAF3FE; /* 연한 파란색 */
    --color-text: #222222;          /* 기본 텍스트 */
    --color-text-muted: #999999;    /* 흐린 텍스트 */
    --color-bg: #ffffff;            /* 배경 */
    --color-option-text: #ffffff;   /* 선택지 버튼 텍스트 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'LeeSeoyun', sans-serif;
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    background: var(--color-bg);
    border-radius: 40px;
    border: 2.5px solid #222;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  /* ── 화면 공통 ── */
  .screen { display: none; flex-direction: column; min-height: 680px; }
  .screen.active { display: flex; }

  /* =============================================
     📋 시작 화면
     ============================================= */
  #screen-start {
    align-items: center;
    justify-content: center;
    padding: 60px 32px 48px;
    gap: 0;
    text-align: center;
  }

  /* ✏️ 설문 제목 수정 */
  .survey-main-title {
    color: var(--color-primary);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  /* ✏️ 설문 부제목/설명 수정 */
  .survey-subtitle {
    color: var(--color-text-muted);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: auto;
  }

  .start-spacer { flex: 1; }

  .start-btn {
    width: 100%;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 40px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .start-btn:hover { background: var(--color-primary-dark); }

  .made-with {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 20px;
  }

  /* =============================================
     ❓ 질문 화면
     ============================================= */
  #screen-question { padding: 0; }

  .q-top { padding: 20px 24px 0; }

  .q-progress-label {
    text-align: right;
    font-size: 12px;
    color: var(--color-text-muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 5px;
    background: #e8e8e8;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--color-primary);
    border-radius: 10px;
    transition: width 0.35s ease;
  }

  .q-number {
    color: var(--color-primary);
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin: 32px 0 20px;
  }

  .q-text {
    font-size: 15px;
    color: var(--color-text);
    text-align: center;
    line-height: 1.75;
    padding: 0 28px;
    margin-bottom: 40px;
    word-break: keep-all;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 24px;
  }

  .opt-btn {
    background: var(--color-primary);
    color: var(--color-option-text);
    border: none;
    border-radius: 50px;
    padding: 20px 24px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    transition: background 0.15s, transform 0.1s;
    word-break: keep-all;
  }
  .opt-btn:hover { background: var(--color-primary-dark); }
  .opt-btn:active { transform: scale(0.98); }

  .q-footer {
    margin-top: auto;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--color-text-muted);
  }

  /* =============================================
     🏆 결과 화면
     ============================================= */
  #screen-result { padding: 0; }

  .result-top {
    background: var(--color-primary);
    padding: 52px 24px 64px;
    text-align: center;
  }

  .result-type-label {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .result-type-name {
    color: #fff;
    font-size: 30px;
    font-weight: 700;
  }

  .result-card {
    background: var(--color-bg);
    margin: -32px 20px 0;
    border-radius: 24px;
    padding: 28px 24px 24px;
    border: 0.5px solid #e8e8e8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .result-card-title {
    color: var(--color-primary-dark);
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 12px;
  }

  .result-divider {
    width: 32px;
    height: 3px;
    background: #e8e8e8;
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .result-ratio {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    background: var(--color-primary-light);
    border-radius: 16px;
    padding: 16px;
  }

  .ratio-item { text-align: center; }

  .ratio-num {
    font-size: 24px;
    font-weight: 700;
    color: var(--color-primary-dark);
  }

  .ratio-label {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 4px;
  }

  .ratio-sep {
    color: #ccc;
    font-size: 20px;
    font-weight: 300;
  }

  .result-desc {
    font-size: 14px;
    color: #444;
    line-height: 1.8;
    text-align: center;
    word-break: keep-all;
  }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 24px 32px;
  }

  .result-btn-sub {
    background: var(--color-primary-light);
    color: var(--color-primary-dark);
    border: none;
    border-radius: 50px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .result-btn-sub:hover { background: #d5e9fd; }
</style>
</head>
<body>

<div class="phone">

  <!-- ==========================================
       🟦 시작 화면
       ========================================== -->
  <div id="screen-start" class="screen active">

    <!-- ✏️ 여기서 설문 제목을 수정하세요 -->
    <div class="survey-main-title">
      행복의 조건 7조 설문
    </div>

    <!-- ✏️ 여기서 설명 문구를 수정하세요 -->
    <div class="survey-subtitle">
      총 10개의 질문에 솔직하게 답해주세요. 하나의 영상을 시청한 후 영상 끝에 선택지가 나옵니다. 선택지와 설문지의 문항이 같으니 영상을 하나씩 시청할 때마다 한 문항씩 설문해주세요. 
    </div>

    <div class="start-spacer"></div>

    <button class="start-btn" onclick="startSurvey()">설문 시작하기</button>
    <div class="made-with">나와의 행복</div>
  </div>


  <!-- ==========================================
       ❓ 질문 화면
       ========================================== -->
  <div id="screen-question" class="screen">
    <div class="q-top">
      <div class="q-progress-label" id="q-label">1/10</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="q-bar" style="width:10%"></div>
      </div>
    </div>
    <div class="q-number" id="q-num">Q1.</div>
    <div class="q-text" id="q-text"></div>
    <div class="options">
      <button class="opt-btn" id="opt1" onclick="selectAnswer(1)"></button>
      <button class="opt-btn" id="opt2" onclick="selectAnswer(2)"></button>
    </div>
    <div class="q-footer">행복의 조건 7조</div>
  </div>


  <!-- ==========================================
       🏆 결과 화면
       ========================================== -->
  <div id="screen-result" class="screen">
    <div class="result-top">
      <div class="result-type-label" id="r-type-label">유형 3</div>
      <div class="result-type-name" id="r-type-name">균형형</div>
    </div>
    <div class="result-card">
      <div class="result-card-title" id="r-title">균형형</div>
      <div class="result-divider"></div>
      <div class="result-ratio">
        <div class="ratio-item">
          <div class="ratio-num" id="r-self">50%</div>
          <div class="ratio-label">자기지각</div>
        </div>
        <div class="ratio-sep">|</div>
        <div class="ratio-item">
          <div class="ratio-num" id="r-other">50%</div>
          <div class="ratio-label">타인지각</div>
        </div>
      </div>
      <div class="result-desc" id="r-desc"></div>
    </div>
    <div class="result-btns">
      <button class="result-btn-sub" onclick="resetSurvey()">다시 시작하기</button>
    </div>
  </div>

</div><!-- /.phone -->


<script>
/* =============================================
   ✏️ 질문 & 선택지 수정 영역
   - q: 질문 텍스트
   - a1: 1번 선택지 (자기지각)
   - a2: 2번 선택지 (타인지각)
   ============================================= */
const questions = [
  {
    q: "새로운 환경에서 내가 느끼는 감정이 무엇인지 어떻게 판단합니까?",
    a1: "내가 한 행동과 몸의 반응을 돌아보며 내 감정을 파악한다.",
    a2: "주변 사람들이 나를 어떻게 보는지 살피며 내 감정을 판단한다."
  },
  {
    q: "새로운 사람을 만났을 때, 나는 나 자신을 어떻게 파악합니까?",
    a1: "내가 편안한지, 어색한지 내 반응을 살피며 판단한다.",
    a2: "상대가 나를 어떻게 대하는지를 보고 나의 모습을 판단한다."
  },
  {
    q: "내가 어떤 내용을 잘 이해했는지 판단할 때, 무엇을 기준으로 합니까?",
    a1: "내가 직접 설명할 수 있는지, 내 생각으로 정리되는지를 기준으로 판단한다.",
    a2: "다른 사람이 보기에 똑똑해 보이는지, 그럴듯해 보이는지를 기준으로 판단한다."
  },
  {
    q: "예상치 못한 문제가 생겼을 때, 내 반응의 원인을 어떻게 파악합니까?",
    a1: "내가 어떤 상황에서 어떤 행동을 했는지 돌아보며 내 반응을 이해한다.",
    a2: "다른 사람이 내 반응을 어떻게 볼지 생각하며 내 태도를 판단한다."
  },
  {
    q: "내 생각과 다른 사람의 생각이 다를 때, 나는 어떻게 받아들입니까?",
    a1: "내 생각은 나의 경험과 관심에서 나온 것이라고 이해한다.",
    a2: "다른 사람들의 반응을 보고 내 생각이 맞는지 틀린지 판단한다."
  },
  {
    q: "발표 후 내가 잘했는지 못했는지 어떻게 판단합니까?",
    a1: "내가 준비한 내용을 얼마나 전달했는지 스스로 돌아보며 판단한다.",
    a2: "청중의 표정, 분위기, 반응을 보고 내 발표를 판단한다."
  },
  {
    q: "부족한 결과를 받았을 때, 나는 무엇을 기준으로 나를 위로합니까?",
    a1: "내가 실제로 노력한 과정과 배운 점을 떠올리며 나를 위로한다.",
    a2: "다른 사람이 나를 이해해주거나 인정해주는지를 통해 위로받는다."
  },
  {
    q: "갈등 상황에서 상대방의 감정을 어떻게 파악합니까?",
    a1: "내가 그 상황이라면 어땠을지 떠올리며 상대의 감정을 추측한다.",
    a2: "상대의 표정, 말투, 행동, 상황을 관찰하며 상대의 감정을 파악한다."
  },
  {
    q: "좋은 결과가 나왔을 때, 나는 그 성공을 어떻게 이해합니까?",
    a1: "내가 어떤 행동을 했고 무엇을 배웠는지 돌아보며 성공의 이유를 파악한다.",
    a2: "다른 사람의 칭찬이나 평가를 통해 내가 잘했다는 것을 확신한다."
  },
  {
    q: "하루를 마치고 나의 가치와 능력을 평가할 때, 무엇을 기준으로 합니까?",
    a1: "과거의 나와 비교해 무엇이 달라졌는지 보며 나를 평가한다.",
    a2: "주변 사람들과 비교해 내가 어느 정도인지 보며 나를 평가한다."
  }
];

/* =============================================
   ✏️ 결과 유형 수정 영역
   - score1 기준 (1번을 고른 횟수):
     유형1: 0~2개  유형2: 3~4개  유형3: 5~6개
     유형4: 7~8개  유형5: 9~10개
   - type: 결과 화면 상단 크게 표시되는 유형명
   - title: 결과 카드 제목
   - desc: 결과 설명 (100~200자 권장)
   ============================================= */
const results = [
  {
    
    title: "타인지각 우세형",
    desc: "당신은 타인의 시선과 반응을 통해 자신을 이해하는 경향이 강합니다. 관계 속에서 세심한 배려심을 발휘하지만, 때로는 스스로의 감정과 생각에도 귀를 기울여 보세요. 내면의 목소리가 가장 솔직한 나침반이 될 수 있습니다."
  },
  {
    
    title: "타인지각 성향형",
    desc: "주변의 반응과 평가가 당신의 자기 이해에 중요한 역할을 합니다. 사회적 감수성이 뛰어난 강점이 있지만, 가끔은 외부 의견보다 자신의 내면 경험을 먼저 살피는 연습을 해보세요."
  },
  {
    
    title: "균형형",
    desc: "자기 내면의 목소리와 타인의 반응을 균형 있게 참고하는 유형입니다. 두 가지 시각을 유연하게 활용하는 것이 강점이지만, 판단 기준을 더 명확히 세우면 자기 이해가 한층 깊어질 수 있습니다."
  },
  {
   
    title: "자기지각 성향형",
    desc: "자신의 행동, 감정, 경험을 내면에서 먼저 탐색하는 경향이 강합니다. 자기 이해의 깊이가 탄탄한 강점이 있습니다. 때로는 타인의 시각도 자신을 새롭게 발견하는 거울이 될 수 있음을 기억하세요."
  },
  {
   
    title: "자기지각 우세형",
    desc: "자신의 내면을 깊이 탐색하고 스스로 판단하는 자기지각이 매우 강한 유형입니다. 독립적인 사고가 큰 강점이지만, 타인의 관점을 유연하게 받아들이는 자세도 함께 키워나가면 더욱 성장할 수 있습니다."
  }
];

/* ── 내부 로직 (수정 불필요) ── */
let current = 0;
let score1 = 0;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startSurvey() {
  current = 0; score1 = 0;
  loadQuestion();
  show('screen-question');
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById('q-label').textContent = (current + 1) + '/10';
  document.getElementById('q-bar').style.width = ((current + 1) / 10 * 100) + '%';
  document.getElementById('q-num').textContent = 'Q' + (current + 1) + '.';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('opt1').textContent = q.a1;
  document.getElementById('opt2').textContent = q.a2;
}

function selectAnswer(choice) {
  if (choice === 1) score1++;
  current++;
  if (current < 10) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let tier;
  if (score1 <= 2) tier = 0;
  else if (score1 <= 4) tier = 1;
  else if (score1 <= 6) tier = 2;
  else if (score1 <= 8) tier = 3;
  else tier = 4;

  const r = results[tier];
  const selfPct = Math.round(score1 / 10 * 100);
  const otherPct = 100 - selfPct;

  document.getElementById('r-type-label').textContent = r.type;
  document.getElementById('r-type-name').textContent = r.title;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-self').textContent = selfPct + '%';
  document.getElementById('r-other').textContent = otherPct + '%';
  document.getElementById('r-desc').textContent = r.desc;

  show('screen-result');
}

function resetSurvey() {
  show('screen-start');
}
</script>
</body>
</html>
