<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나와의 행복</title>
<style>
/* 눈누 공식 이서윤체 웹폰트 불러오기 */
@import url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff2');

@font-face {
  font-family: 'LeeSeoyun';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
</style>
<style>
  /* =============================================
     🎨 색상 & 폰트 수정 가능 영역
     ============================================= */
  :root {
    --color-primary: #7DB8FA;       /* 메인 파란색 */
    --color-primary-dark: #5B9BF8;  /* 진한 파란색 */
    --color-primary-light: #EAF3FE; /* 연한 파란색 */
    --color-text: #222222;          /* 기본 텍스트 */
    --color-text-muted: #999999;    /* 흐린 텍스트 */
    --color-bg: #ffffff;            /* 배경 */
    --color-option-text: #ffffff;   /* 선택지 버튼 텍스트 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'LeeSeoyun', sans-serif !important;
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    background: var(--color-bg);
    border-radius: 40px;
    border: 2.5px solid #222;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  /* ── 화면 공통 ── */
  .screen { display: none; flex-direction: column; min-height: 680px; }
  .screen.active { display: flex; }

  /* =============================================
     📋 시작 화면
     ============================================= */
  #screen-start {
    align-items: center;
    justify-content: center;
    padding: 60px 32px 48px;
    gap: 0;
    text-align: center;
  }

  /* ✏️ 설문 제목 수정 */
  .survey-main-title {
    color: var(--color-primary);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 12px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  /* ✏️ 설문 부제목/설명 수정 */
  .survey-subtitle {
    color: var(--color-text-muted);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: auto;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .start-spacer { flex: 1; }

  .start-btn {
    width: 100%;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 40px;
    font-family: 'LeeSeoyun', sans-serif;
    transition: background 0.2s;
  }
  .start-btn:hover { background: var(--color-primary-dark); }

  .made-with {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 20px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  /* =============================================
     ❓ 질문 화면
     ============================================= */
  #screen-question { padding: 0; }

  .q-top { padding: 20px 24px 0; }

  .q-progress-label {
    text-align: right;
    font-size: 12px;
    color: var(--color-text-muted);
    margin-bottom: 8px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .progress-bar-bg {
    width: 100%;
    height: 5px;
    background: #e8e8e8;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--color-primary);
    border-radius: 10px;
    transition: width 0.35s ease;
  }

  .q-number {
    color: var(--color-primary);
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin: 32px 0 20px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .q-text {
    font-size: 15px;
    color: var(--color-text);
    text-align: center;
    line-height: 1.75;
    padding: 0 28px;
    margin-bottom: 40px;
    word-break: keep-all;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 24px;
  }

  .opt-btn {
    background: var(--color-primary);
    color: var(--color-option-text);
    border: none;
    border-radius: 50px;
    padding: 20px 24px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    cursor: pointer;
    text-align: center;
    font-family: 'LeeSeoyun', sans-serif;
    transition: background 0.15s, transform 0.1s;
    word-break: keep-all;
  }
  .opt-btn:hover { background: var(--color-primary-dark); }
  .opt-btn:active { transform: scale(0.98); }

  .q-footer {
    margin-top: auto;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--color-text-muted);
    font-family: 'LeeSeoyun', sans-serif;
  }

  /* =============================================
     🏆 결과 화면
     ============================================= */
  #screen-result { padding: 0; }

  .result-top {
    background: var(--color-primary);
    padding: 64px 24px 64px;
    text-align: center;
  }

  .result-type-name {
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .result-card {
    background: var(--color-bg);
    margin: -32px 20px 0;
    border-radius: 24px;
    padding: 28px 24px 24px;
    border: 0.5px solid #e8e8e8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .result-card-title {
    color: var(--color-primary-dark);
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 12px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .result-divider {
    width: 32px;
    height: 3px;
    background: #e8e8e8;
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .result-ratio {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    background: var(--color-primary-light);
    border-radius: 16px;
    padding: 16px;
  }

  .ratio-item { text-align: center; }

  .ratio-num {
    font-size: 24px;
    font-weight: 700;
    color: var(--color-primary-dark);
    font-family: 'LeeSeoyun', sans-serif;
  }

  .ratio-label {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 4px;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .ratio-sep {
    color: #ccc;
    font-size: 20px;
    font-weight: 300;
  }

  .result-desc {
    font-size: 14px;
    color: #444;
    line-height: 1.8;
    text-align: center;
    word-break: keep-all;
    font-family: 'LeeSeoyun', sans-serif;
  }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 24px 32px;
  }
